name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          test "$TAG_VERSION" = "$PACKAGE_VERSION" || {
            echo "Tag version $TAG_VERSION does not match package.json $PACKAGE_VERSION"
            exit 1
          }
      - run: bun test
      - run: bunx tsc -p tsconfig.json --noEmit
      - name: Require completed binary redistribution review
        env:
          APPROVED: ${{ vars.BINARY_REDISTRIBUTION_APPROVED }}
        run: |
          test "$APPROVED" = "true" || {
            echo "Set repository variable BINARY_REDISTRIBUTION_APPROVED=true only after Bun and bundled-binary notices/relink materials have been reviewed."
            exit 1
          }

  build:
    needs: verify
    environment: macos-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: arm64
            runner: macos-15
          - target: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/homebrain.keychain-db"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build signed app
        env:
          HOMEBRAIN_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: bun run build:macos --target "${{ matrix.target }}"

      - name: Verify and smoke-test app
        run: |
          codesign --verify --deep --strict --verbose=2 dist/Homebrain.app
          bun run smoke:macos --app dist/Homebrain.app

      - name: Create, sign, notarize, and staple DMG
        env:
          VERSION: ${{ github.ref_name }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${VERSION#v}"
          STAGE="$RUNNER_TEMP/dmg-root"
          DMG="dist/Homebrain-${VERSION}-macos-${TARGET}.dmg"
          mkdir -p "$STAGE"
          cp -R dist/Homebrain.app "$STAGE/Homebrain.app"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname Homebrain -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          codesign --force --timestamp --sign "$SIGNING_IDENTITY" "$DMG"
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$DMG"
          MOUNT_DIR="$(mktemp -d)"
          cleanup_dmg() {
            hdiutil detach "$MOUNT_DIR" -quiet || true
            rm -rf "$MOUNT_DIR"
          }
          trap cleanup_dmg EXIT
          hdiutil attach "$DMG" -nobrowse -readonly -mountpoint "$MOUNT_DIR"
          bun run smoke:macos --app "$MOUNT_DIR/Homebrain.app"
          cleanup_dmg
          trap - EXIT

      - uses: actions/upload-artifact@v4
        with:
          name: Homebrain-macos-${{ matrix.target }}
          path: dist/Homebrain-*-macos-${{ matrix.target }}.dmg
          if-no-files-found: error

  publish:
    needs: build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/download-artifact@v4
        with:
          pattern: Homebrain-macos-*
          path: dist/release
          merge-multiple: true
      - name: Write signed update manifest
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          bun run scripts/write-update-manifest.ts \
            --version "$VERSION" \
            --repository "$GITHUB_REPOSITORY" \
            --arm64 "dist/release/Homebrain-${VERSION}-macos-arm64.dmg" \
            --x64 "dist/release/Homebrain-${VERSION}-macos-x64.dmg" \
            --output dist/release/update-manifest.json
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.dmg
            dist/release/update-manifest.json
          fail_on_unmatched_files: true
